<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>정보 시험 대비 최종 통합 퀴즈</title>
<style>
  :root{
    --bg:#f8f9fc;
    --surface:#ffffff;
    --border:#e2e6ed;
    --accent:#2563eb;
    --accent-dark:#1d4ed8;
    --accent-soft:#eff6ff;
    --text:#1e293b;
    --text-muted:#64748b;
    --code-bg:#f1f5f9;
    --code-border:#cbd5e1;
    --correct:#16a34a;
    --wrong:#dc2626;
    --warning:#facc15;
  }
  *{box-sizing:border-box;margin:0;padding:0}

  /* 스마트폰 오른쪽 잘림 방지 */
  html, body{
    width:100%;
    max-width:100%;
    overflow-x:hidden;
  }
  .app, .header, .sticky-menu-wrap, .question-card, .result-card, .completion-box{
    max-width:100%;
  }
  .question-card{
    overflow:hidden;
  }
  .question-text,
  .choice-btn,
  .q-box,
  .feedback,
  .code-block{
    min-width:0;
    overflow-wrap:break-word;
    word-break:keep-all;
  }
  .code-block{
    max-width:100%;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
  }
  .code-table-wrap{
    width:100%;
    max-width:100%;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
  }
  .code-table{
    min-width:680px;
  }

  body{
    font-family:'Noto Sans KR',system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:var(--bg);
    color:var(--text);
    line-height:1.7;
    padding:2rem 1rem 3.5rem;
  }
  .app{max-width:920px;margin:0 auto;padding:0}
  .header{
    background:var(--accent);
    color:#fff;
    border-radius:14px;
    padding:1.8rem 2.2rem;
    margin-bottom:1.2rem;
    box-shadow:none;
    border:none;
  }
  .badge{
    display:inline-flex;
    align-items:center;
    gap:.35rem;
    font-size:.82rem;
    font-weight:700;
    color:#fff;
    background:rgba(255,255,255,.18);
    padding:.35rem .7rem;
    border-radius:999px;
    margin-bottom:.65rem;
  }
  h1{
    margin:0;
    font-size:clamp(1.7rem,4vw,2.3rem);
    line-height:1.25;
    letter-spacing:-.04em;
    color:#fff;
    background:transparent;
    border:none;
    border-radius:0;
    padding:0;
    box-shadow:none;
  }
  h2{margin:0;font-size:clamp(1.25rem,3vw,1.8rem);letter-spacing:-.03em}
  .subtitle{margin-top:.45rem;color:rgba(255,255,255,.86);font-size:.92rem}

  .sticky-menu-wrap{
    position:relative;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:12px;
    padding:.9rem;
    margin-bottom:1.2rem;
    box-shadow:none;
  }
  .sticky-menu-inner{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(138px,1fr));
    gap:.55rem;
    overflow:visible;
    white-space:normal;
  }
  .unit-menu-box{
    border:1px solid var(--border);
    background:#fff;
    border-radius:10px;
    padding:.55rem;
  }
  .unit-menu-title{
    font-size:.78rem;
    font-weight:800;
    color:var(--text);
    margin-bottom:.45rem;
    line-height:1.3;
    background:#f8fafc;
    border:1px solid #edf1f7;
    border-radius:8px;
    padding:.38rem .5rem;
  }
  .unit-menu-actions{display:flex;gap:.35rem}
  .quick-menu-btn{
    flex:1;
    border:1px solid var(--border);
    background:#fff;
    color:var(--text-muted);
    border-radius:8px;
    padding:.38rem .4rem;
    font-size:.75rem;
    font-weight:800;
    cursor:pointer;
    white-space:nowrap;
    font-family:inherit;
  }
  .quick-menu-btn:hover{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
  .quick-menu-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

  .screen{display:none}.screen.active{display:block}
  .quiz-layout{display:block}
  .quiz-main,.side-panel,.result-card{
    background:transparent;
    border:none;
    border-radius:0;
    box-shadow:none;
  }
  .quiz-main{padding:0}
  .quiz-title-bar{
    display:block;
    color:var(--text-muted);
    font-size:.78rem;
    font-weight:900;
    letter-spacing:1px;
    margin:1.6rem 0 .8rem;
    padding-left:.55rem;
    border-left:3px solid var(--accent);
    background:transparent;
    border-top:none;
    border-right:none;
    border-bottom:none;
    border-radius:0;
    line-height:1.35;
  }
  .question-list{display:grid;gap:1rem}
  .question-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:10px;
    padding:1.45rem 1.65rem;
    margin:0;
    box-shadow:none;
    transition:border-color .2s, box-shadow .2s;
  }
  .question-card.correct{border-color:var(--correct);box-shadow:0 2px 12px rgba(22,163,74,.10)}
  .question-card.wrong{border-color:var(--wrong);box-shadow:0 2px 12px rgba(220,38,38,.10)}
  .question-card-head{
    display:grid;
    grid-template-columns:max-content minmax(0,1fr) auto;
    align-items:flex-start;
    column-gap:.32rem;
    row-gap:.35rem;
    margin-bottom:.7rem;
  }
  .question-num{
    display:inline-block;
    color:var(--accent);
    background:transparent;
    border:none;
    border-radius:0;
    padding:0;
    font-size:1rem;
    font-weight:900;
    margin:.08rem 0 0;
    min-width:0;
    width:auto;
    line-height:1.7;
    white-space:nowrap;
  }
  .type-pill{
    display:none;
  }
  .result-badge{
    display:none;
    font-size:.8rem;
    font-weight:900;
    padding:.18rem .7rem;
    border-radius:999px;
    margin-left:auto;
  }
  .question-card.correct .result-badge{display:inline-block;background:#dcfce7;color:var(--correct)}
  .question-card.wrong .result-badge{display:inline-block;background:#fee2e2;color:var(--wrong)}
  .score-badge{display:inline-block;font-size:.8rem;font-weight:800;color:var(--wrong);background:#fff1f2;border-radius:999px;padding:.18rem .7rem;white-space:nowrap;margin-left:.45rem}
  .question-text{
    font-size:.96rem;
    flex:1;
    font-weight:500;
    line-height:1.75;
    margin:0;
    letter-spacing:-.01em;
    margin-bottom:.8rem;
  }
  u{text-decoration-thickness:2px;text-underline-offset:3px;text-decoration-color:var(--warning)}
  .question-blocks{
    width:100%;
    margin:.7rem 0 0;
  }
  .question-blocks .q-box,
  .question-blocks .code-block,
  .question-blocks .sort-array{
    margin-left:0;
    margin-right:0;
  }

  .q-box{
    background:#f8fafc;
    border:1px solid var(--code-border);
    border-radius:7px;
    padding:.85rem 1rem;
    margin:.65rem 0;
    font-size:.9rem;
    line-height:1.8;
    font-weight:500;
  }
  .q-box li{list-style:none;padding-left:1.05rem;position:relative}
  .q-box li::before{content:'o';position:absolute;left:0;color:var(--text-muted)}
  .code-block{
    display:block;
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    background:var(--code-bg);
    border:1px solid var(--code-border);
    border-radius:7px;
    padding:.85rem 1rem;
    margin:.65rem 0;
    font-size:.86rem;
    line-height:1.7;
    white-space:pre;
    overflow-x:auto;
  }
  code{background:var(--code-bg);border-radius:4px;padding:1px 5px}
  .sort-array{display:flex;gap:.4rem;flex-wrap:wrap;margin:.65rem 0}
  .sort-cell{
    border:1px solid var(--border);
    border-radius:5px;
    padding:.38rem .65rem;
    background:#fff;
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    font-weight:800;
    min-width:2.4rem;
    text-align:center;
  }

  .choice-list{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(115px,1fr));
    gap:.42rem .5rem;
    margin-top:.75rem;
  }
  .choice-list.full{grid-template-columns:1fr}
  .choice-btn{
    width:100%;
    border:1.5px solid var(--border);
    background:#f8fafc;
    color:var(--text);
    border-radius:8px;
    padding:.45rem .55rem;
    font-size:.84rem;
    text-align:center;
    cursor:pointer;
    display:flex;
    gap:.35rem;
    align-items:center;
    justify-content:center;
    transition:background .15s,border-color .15s,transform .1s;
    min-height:38px;
    line-height:1.45;
    word-break:keep-all;
    white-space:normal;
    font-family:inherit;
    -webkit-tap-highlight-color:transparent;
  }
  .choice-list.full .choice-btn{justify-content:flex-start;text-align:left;padding:.65rem .75rem}
  .choice-btn:hover:not(:disabled){background:var(--accent-soft);border-color:var(--accent)}
  .choice-btn:active:not(:disabled){transform:scale(.98)}
  .choice-btn:disabled{cursor:default;opacity:1}
  .choice-btn.correct{background:#dcfce7;border-color:var(--correct);color:var(--correct);font-weight:800}
  .choice-btn.wrong{background:#fee2e2;border-color:var(--wrong);color:var(--wrong);font-weight:800}
  .choice-mark,.choice-num{
    flex:0 0 auto;
    width:auto;
    height:auto;
    border-radius:0;
    display:inline;
    place-items:unset;
    background:transparent;
    font-size:.86rem;
    font-weight:800;
    color:var(--text-muted);
  }
  .choice-btn.correct .choice-mark,
  .choice-btn.wrong .choice-mark{color:inherit}

  .code-table-wrap{margin-top:.85rem}
  .code-table{width:100%;border-collapse:collapse;font-size:.87rem;margin:0;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:#fff}
  .code-table th{background:#f1f5f9;padding:.6rem .95rem;text-align:left;border:1px solid var(--border);font-weight:700;color:var(--text-muted)}
  .code-table td{padding:.65rem .95rem;border:1px solid var(--border);vertical-align:top}
  .code-table tr:nth-child(even) td{background:#fafbfc}
  .code-table .code-cell{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:.84rem;white-space:pre;line-height:1.7}
  .code-table tr.choice-row{cursor:pointer}
  .code-table tr.choice-row:hover td{background:#eff6ff}
  .code-table tr.choice-row.correct td{background:#dcfce7 !important;border-color:rgba(22,163,74,.25);color:#166534;font-weight:700}
  .code-table tr.choice-row.wrong td{background:#fee2e2 !important;border-color:rgba(220,38,38,.25);color:#991b1b;font-weight:700}
  .feedback{
    display:none;
    margin-top:.85rem;
    border-radius:8px;
    padding:.85rem 1rem;
    border:1px solid var(--border);
    background:#f8fafc;
    font-size:.9rem;
  }
  .feedback.show{display:block}
  .feedback.correct{border-color:rgba(22,163,74,.35);background:#f0fdf4}
  .feedback.wrong{border-color:rgba(220,38,38,.35);background:#fef2f2}
  .feedback-title{font-weight:900;margin-bottom:.25rem}
  .keyword-wrap{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.55rem}
  .keyword{font-size:.74rem;font-weight:800;color:#1e40af;background:#dbeafe;border-radius:999px;padding:.18rem .55rem}

  .completion-box,.side-panel,.result-card{
    margin-top:1.2rem;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:10px;
    padding:1.2rem 1.5rem;
    text-align:center;
  }
  .completion-box{display:flex;align-items:center;justify-content:space-between;gap:.8rem;text-align:left}
  .completion-text{font-size:.95rem;color:var(--text);font-weight:800}
  .side-panel{position:static;text-align:left}
  .progress-box{margin-bottom:.9rem}
  .progress-label{display:flex;justify-content:space-between;font-size:.82rem;color:var(--text-muted);margin-bottom:.35rem}
  .progress-track{width:100%;height:8px;border-radius:999px;background:#eef2f7;overflow:hidden}
  .progress-fill{height:100%;width:0%;border-radius:999px;background:var(--accent);transition:width .2s ease}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-top:.8rem}
  .stat{background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:.75rem;text-align:center}
  .stat .num{font-size:1.5rem;font-weight:900;color:var(--accent)}
  .stat .txt{font-size:.75rem;color:var(--text-muted)}
  .actions{display:flex;flex-wrap:wrap;gap:.55rem;margin-top:.85rem}
  button.action{border:none;border-radius:8px;padding:.55rem 1rem;font-size:.86rem;font-weight:900;cursor:pointer;min-height:40px;font-family:inherit}
  .btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-dark)}
  .btn-gray{background:#f8fafc;color:var(--text-muted);border:1px solid var(--border)!important}.btn-gray:hover{border-color:var(--accent)!important;color:var(--accent)}
  .btn-danger{background:#fef2f2;color:#b91c1c}.btn-green{background:#dcfce7;color:#15803d}
  .small-note{color:var(--text-muted);font-size:.82rem;margin-top:.65rem;text-align:center}
  .retry-banner{display:none;margin-bottom:.9rem;border:1px solid #facc15;background:#fefce8;color:#854d0e;border-radius:8px;padding:.75rem .9rem;font-weight:900;font-size:.88rem}
  .retry-banner.show{display:block}
  .result-score{font-size:clamp(2.8rem,8vw,4.8rem);line-height:1;font-weight:900;color:var(--accent);margin:.8rem 0}
  .result-card .subtitle{color:var(--text-muted)}
  .review-list{margin-top:1rem;text-align:left;display:grid;gap:.6rem}
  .review-item{border:1px solid var(--border);border-radius:8px;background:#f8fafc;padding:.8rem;font-size:.86rem}
  .hidden{display:none!important}

  @media(max-width:700px){
    body{padding:1rem .65rem 2.5rem}
    .header{padding:1.35rem 1.2rem;border-radius:12px}
    .sticky-menu-inner{grid-template-columns:repeat(2,minmax(0,1fr))}
    .question-card{padding:1.1rem 1rem}
    .choice-list{grid-template-columns:1fr 1fr}
    .choice-list.full{grid-template-columns:1fr}
    .question-num{min-width:auto}
    .result-badge{margin-left:0}
    .score-badge{margin-left:0}
    .completion-box{display:block;text-align:center}
    .completion-box .action{width:100%;margin-top:.7rem}
    .actions button.action{flex:1 1 100%}
  }
  @media(max-width:600px){
    body{padding:.75rem .45rem 2.5rem}
    .app{width:100%;max-width:100%;margin:0 auto}
    .header{padding:1.25rem 1rem;border-radius:12px}
    .sticky-menu-wrap{padding:.7rem;border-radius:10px}
    .sticky-menu-inner{grid-template-columns:repeat(2,minmax(0,1fr));gap:.45rem}
    .unit-menu-box{padding:.45rem;min-width:0}
    .unit-menu-actions{gap:.28rem}
    .quick-menu-btn{font-size:.72rem;padding:.36rem .25rem;min-width:0}
    .question-card{padding:1rem .82rem;border-radius:10px;width:100%;max-width:100%;overflow:hidden}
    .question-card-head{column-gap:.32rem;row-gap:.35rem;align-items:flex-start}
    .question-num{min-width:0;width:auto;flex:none}
    .question-text{max-width:100%;font-size:.94rem}
    .result-badge{margin-left:0}
    .score-badge{margin-left:0}
    .question-blocks{width:100%;max-width:100%}
    .q-box{width:100%;max-width:100%;padding:.78rem .85rem}
    .choice-list{grid-template-columns:repeat(2,minmax(0,1fr));gap:.42rem}
    .choice-list.full{grid-template-columns:1fr}
    .choice-btn{font-size:.8rem;padding:.48rem .55rem;min-width:0;justify-content:flex-start;text-align:left}
    .choice-mark{width:1.25rem;min-width:1.25rem}
    .code-block{font-size:.78rem;padding:.78rem .85rem}
    .code-table-wrap{margin-top:.7rem}
    .code-table{min-width:640px;font-size:.8rem}
    .code-table th,.code-table td{padding:.55rem .65rem}
    .side-panel{padding:0}
    .actions button.action{width:100%}
  }

  @media(max-width:380px){
    .choice-list{grid-template-columns:1fr}
    .question-text{flex-basis:100%;max-width:100%}
    .question-num{flex-basis:auto}
    .score-badge{font-size:.76rem}
  }


  /* 모바일 단원 메뉴 압축 배치 */
  @media(max-width:600px){
    .header{
      margin-bottom:.75rem;
    }
    .sticky-menu-wrap{
      padding:.55rem;
      margin-bottom:.9rem;
    }
    .sticky-menu-inner{
      display:grid !important;
      grid-template-columns:repeat(2,minmax(0,1fr)) !important;
      gap:.45rem !important;
    }
    .unit-menu-box{
      padding:.45rem !important;
      border-radius:10px;
      min-width:0;
    }
    .unit-menu-title{
      font-size:.78rem;
      padding:.38rem .42rem;
      margin-bottom:.35rem;
      border-radius:8px;
      line-height:1.25;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .unit-menu-actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:.3rem;
    }
    .quick-menu-btn{
      font-size:.73rem;
      padding:.36rem .2rem;
      min-height:34px;
      border-radius:8px;
      min-width:0;
    }
  }

  @media(max-width:360px){
    .sticky-menu-inner{
      grid-template-columns:repeat(2,minmax(0,1fr)) !important;
      gap:.35rem !important;
    }
    .unit-menu-title{
      font-size:.72rem;
    }
    .quick-menu-btn{
      font-size:.68rem;
      min-height:32px;
    }
  }


  /* 기출문제 단일 버튼과 모바일 문제 제목 줄맞춤 */
  .single-action-box .unit-menu-actions{
    grid-template-columns:1fr;
  }
  .single-action-box .quick-menu-btn{
    width:100%;
  }

  @media(max-width:600px){
    .single-action-box{
      grid-column:auto;
    }
    .single-action-box .unit-menu-actions{
      grid-template-columns:1fr !important;
    }
    .single-action-box .quick-menu-btn{
      width:100%;
    }

    .question-card-head{
      display:grid !important;
      grid-template-columns:max-content minmax(0,1fr) auto;
      align-items:start;
      column-gap:.32rem;
      row-gap:.35rem;
    }
    .question-num{
      grid-column:1;
      grid-row:1;
      min-width:0;
      width:auto;
      flex:none;
    }
    .question-text{
      grid-column:2;
      grid-row:1;
      max-width:100%;
      flex:none;
    }
    .score-badge{
      grid-column:3;
      grid-row:1;
      align-self:start;
      margin-left:.25rem;
    }
    .result-badge{
      grid-column:2 / 4;
      grid-row:2;
      justify-self:start;
      margin-left:0;
    }
  }

  @media(max-width:420px){
    .question-card-head{
      grid-template-columns:max-content minmax(0,1fr);
    }
    .score-badge{
      grid-column:2;
      grid-row:2;
      justify-self:start;
      margin-left:0;
    }
    .result-badge{
      grid-column:2;
      grid-row:3;
    }
  }


  /* 정답·오답 개수만 간단히 표시 */
  .side-panel{
    margin:.8rem 0 1rem;
  }
  .stat-grid{
    margin-top:0;
    padding:0;
  }
  .stat{
    min-height:58px;
    display:flex;
    flex-direction:column;
    justify-content:center;
  }

</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="badge">📘 시험 대비 개념학습 및 문제풀이</div>
    <h1>정보 시험 대비 최종 통합 퀴즈</h1>
    <div class="subtitle">개념·복습, 기출문제, 모의고사 1·2·3까지 한 번에 학습합니다.</div>
  </header>

  <nav class="sticky-menu-wrap">
    <div id="stickyMenu" class="sticky-menu-inner"></div>
  </nav>

  <section id="quizScreen" class="screen active">
    <div class="quiz-layout">
      <main class="quiz-main">
        <div id="quizTitle" class="quiz-title-bar"></div>
        <div id="retryBanner" class="retry-banner">개념 오답 확인: 틀린 문제를 한 번 더 풀어봅니다.</div>

        <div id="questionList" class="question-list"></div>

        <div id="completionBox" class="completion-box hidden">
          <div id="completionText" class="completion-text">모든 문제를 풀었습니다.</div>
          <button id="finishBtn" class="action btn-primary">결과 보기</button>
        </div>
      </main>

      <aside class="side-panel">

    .replace("2. 사물 인터넷","2. 사물 인터넷")
    .replace("3. 디지털 데이터 압축","3. 데이터 압축")
    .replace("4. 디지털 데이터 암호화","4. 데이터 암호화")
    .replace("5. 빅데이터 개념과 분석","5. 빅데이터")
    .replace("6. 정렬 알고리즘","6. 정렬 알고리즘")
    .replace("7. 디지털 사회와 진로 설계","7. 디지털 사회와 진로")
    .replace("8. 정보 보호","8. 정보 보호")
    .replace("9. 정보 보안","9. 정보 보안")
    .replace("10. 디지털 윤리","10. 디지털 윤리");
}

function renderMenu(){
  const sticky=document.getElementById("stickyMenu");
  sticky.innerHTML="";

  unitOrder.forEach(unit=>{
    const hasConcept=allQuestions.some(q=>q.unit===unit && q.section==="concept");
    const hasReview=allQuestions.some(q=>q.unit===unit && q.section==="review");
    if(!hasConcept && !hasReview) return;

    const box=document.createElement("div");
    box.className="unit-menu-box";

    const title=document.createElement("div");
    title.className="unit-menu-title";
    title.textContent=shortUnitName(unit);

    const actions=document.createElement("div");
    actions.className="unit-menu-actions";

    if(hasConcept){
      const key=`${unit}|concept`;
      const btn=document.createElement("button");
      btn.className="quick-menu-btn"+(currentMenuKey===key?" active":"");
      btn.textContent="개념";
      btn.onclick=()=>startSection(unit,"concept");
      actions.appendChild(btn);
    }

    if(hasReview){
      const key=`${unit}|review`;
      const btn=document.createElement("button");
      btn.className="quick-menu-btn"+(currentMenuKey===key?" active":"");
      btn.textContent="복습";
      btn.onclick=()=>startSection(unit,"review");
      actions.appendChild(btn);
    }

    box.appendChild(title);
    box.appendChild(actions);
    sticky.appendChild(box);
  });

  const pastBox=document.createElement("div");
  pastBox.className="unit-menu-box single-action-box";

  const pastTitle=document.createElement("div");
  pastTitle.className="unit-menu-title";
  pastTitle.textContent="기출문제";

  const pastActions=document.createElement("div");
  pastActions.className="unit-menu-actions";

  const pastBtn=document.createElement("button");
  pastBtn.className="quick-menu-btn"+(currentMenuKey==="기출문제|past"?" active":"");
  pastBtn.textContent="풀어보기";
  pastBtn.onclick=()=>startMockTest("past");

  pastActions.appendChild(pastBtn);
  pastBox.appendChild(pastTitle);
  pastBox.appendChild(pastActions);
  sticky.appendChild(pastBox);

  const mockBox=document.createElement("div");
  mockBox.className="unit-menu-box";

  const mockTitle=document.createElement("div");
  mockTitle.className="unit-menu-title";
  mockTitle.textContent="모의고사";

  const mockActions=document.createElement("div");
  mockActions.className="unit-menu-actions";

  ["mock1","mock2","mock3"].forEach((section,idx)=>{
    const key=`전체 모의고사|${section}`;
    const btn=document.createElement("button");
    btn.className="quick-menu-btn"+(currentMenuKey===key?" active":"");
    btn.textContent=String(idx+1);
    btn.onclick=()=>startMockTest(section);
    mockActions.appendChild(btn);
  });

  mockBox.appendChild(mockTitle);
  mockBox.appendChild(mockActions);
  sticky.appendChild(mockBox);

  updateTotalProgress();
}

function showScreen(id){
  ["quizScreen","resultScreen"].forEach(s=>{
    document.getElementById(s).classList.remove("active");
  });
  document.getElementById(id).classList.add("active");
}

function startSection(unit,section){
  currentUnit=unit;
  currentSection=section;
  currentMenuKey=`${unit}|${section}`;
  currentQuestions=allQuestions.filter(q=>q.unit===unit && q.section===section);
  startQuizBase();
}

function startMockTest(section){
  currentUnit = section==="past" ? "기출문제" : "전체 모의고사";
  currentSection=section;
  currentMenuKey = section==="past" ? "기출문제|past" : `전체 모의고사|${section}`;
  currentQuestions=allQuestions.filter(q=>q.section===section);
  startQuizBase();
}

function startQuizBase(){
  currentIndex=0;
  userAnswers=[];
  submitted=false;
  score=0;
  isConceptRetryMode=false;
  conceptWrongQueue=[];
  document.getElementById("retryBanner").classList.remove("show");
  showScreen("quizScreen");
  renderMenu();
  renderQuestions();
  window.scrollTo({top:0,behavior:"smooth"});
}

function startConceptWrongRetry(){
  if(conceptWrongQueue.length===0){
    finishQuiz();
    return;
  }
  isConceptRetryMode=true;
  currentQuestions=[...conceptWrongQueue];
  currentIndex=0;
  userAnswers=[];
  submitted=false;
  score=0;
  document.getElementById("retryBanner").classList.add("show");
  showScreen("quizScreen");
  renderQuestions();
  window.scrollTo({top:0,behavior:"smooth"});
}

function getQuizTitle(){
  if(currentSection==="past") return "기출문제 풀어보기";
  if(["mock1","mock2","mock3"].includes(currentSection)) return sectionNames[currentSection];
  return `${shortUnitName(currentUnit)} · ${sectionNames[currentSection] || currentSection}`;
}

function renderQuestion(){
  renderQuestions();
}

function renderQuestions(){
  const title=document.getElementById("quizTitle");
  title.textContent=getQuizTitle();

  const list=document.getElementById("questionList");
  list.innerHTML="";

  currentQuestions.forEach((q,questionIndex)=>{
    const card=document.createElement("article");
    card.className="question-card";
    card.id=`qcard-${questionIndex}`;

    const head=document.createElement("div");
    head.className="question-card-head";

    const num=document.createElement("div");
    num.className="question-num";
    num.textContent=`${questionIndex+1}.`;

    const badge=document.createElement("span");
    badge.className="result-badge";

    const scoreBadge=document.createElement("span");
    scoreBadge.className="score-badge";
    scoreBadge.textContent = pastScoreMap[q.id] || "";
    if(!scoreBadge.textContent) scoreBadge.style.display = "none";

    const tempQuestion=document.createElement("div");
    tempQuestion.innerHTML=q.question;

    const questionBlocks=document.createElement("div");
    questionBlocks.className="question-blocks";

    tempQuestion.querySelectorAll('.q-box, .code-block, .sort-array').forEach(block=>{
      if(block.classList && block.classList.contains('q-box')){
        const hasStructured = block.querySelector('ul,ol,li,pre,table');
        if(!hasStructured && /<br\s*\/?/i.test(block.innerHTML)){
          const lines = block.innerHTML.split(/<br\s*\/?>(?:\s*)/i).map(v=>v.trim()).filter(Boolean);
          if(lines.length >= 2){
            block.innerHTML = '<ul>' + lines.map(line=>`<li>${line}</li>`).join('') + '</ul>';
          }
        }
      }
      questionBlocks.appendChild(block);
    });

    const question=document.createElement("div");
    question.className="question-text";
    question.innerHTML=tempQuestion.innerHTML.trim();

    head.appendChild(num);
    head.appendChild(question);
    head.appendChild(badge);
    head.appendChild(scoreBadge);

    const choices=document.createElement("div");
    const isPastQ10 = q.id === "p10";

    if(isPastQ10){
      choices.className="code-table-wrap";
      const table=document.createElement("table");
      table.className="code-table";
      table.innerHTML=`
        <thead><tr><th style="width:82px">번호</th><th>프로그램</th><th>출력 결과</th></tr></thead>
        <tbody></tbody>
      `;
      const tbody=table.querySelector("tbody");
      const circ=["①","②","③","④","⑤"];

      q.choices.forEach((choice,choiceIndex)=>{
        const row=document.createElement("tr");
        row.className="choice-row";
        row.dataset.index=choiceIndex;

        const str=String(choice);
        const preMatch=str.match(/<pre[^>]*>([\s\S]*?)<\/pre>/i);
        let program=preMatch ? preMatch[1] : str;
        let output=str.replace(/<pre[^>]*>[\s\S]*?<\/pre>/i,"");
        output=output.replace(/^\s*출력\s*:\s*/i,"").trim();
        if(output === "h e l l o") output = "h<br>e<br>l<br>l<br>o";
        if(output.startsWith("반지름값:")) output = output.replace(/\s*원의 넓이=/,'<br>원의 넓이=');

        row.innerHTML = `
          <td>${circ[choiceIndex] || choiceIndex+1}</td>
          <td class="code-cell">${program.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</td>
          <td>${output}</td>
        `;
        row.onclick=()=>selectAnswer(questionIndex,choiceIndex);
        tbody.appendChild(row);
      });

      choices.appendChild(table);
    }else{
      const hasLongChoice=q.choices.some(choice=>{
        const plain=String(choice).replace(/<[^>]*>/g,"").trim();
        return plain.length>18 || /<(pre|div|table|code)/i.test(String(choice));
      });
      choices.className="choice-list"+(hasLongChoice?" full":"");

      const circ=["","①","②","③","④","⑤"];
      q.choices.forEach((choice,choiceIndex)=>{
        const btn=document.createElement("button");
        btn.className="choice-btn";
        btn.innerHTML=`<span class="choice-mark">${circ[choiceIndex+1] || choiceIndex+1}</span><span>${choice}</span>`;
        btn.onclick=()=>selectAnswer(questionIndex,choiceIndex);
        choices.appendChild(btn);
      });
    }

    const feedback=document.createElement("div");
    feedback.className="feedback";
    feedback.id=`feedback-${questionIndex}`;
    feedback.innerHTML=`
      <div class="feedback-title"></div>
      <div class="feedback-text"></div>
      <div class="keyword-wrap"></div>
    `;

    card.appendChild(head);
    if(questionBlocks.childElementCount){
      card.appendChild(questionBlocks);
    }
    card.appendChild(choices);
    card.appendChild(feedback);
    list.appendChild(card);
  });

  const completion=document.getElementById("completionBox");
  completion.classList.add("hidden");
  document.getElementById("finishBtn").onclick=finishQuiz;

  updateProgress();
}

function selectAnswer(questionIndex,choiceIndex){
  if(userAnswers[questionIndex]!==undefined) return;

  const q=currentQuestions[questionIndex];
  const isCorrect=choiceIndex===q.answer;

  if(isCorrect) score++;

  userAnswers[questionIndex]=choiceIndex;

  if(!solvedIds.includes(q.id)){
    solvedIds.push(q.id);
    localStorage.setItem("solvedIds_final_v5",JSON.stringify(solvedIds));
  }

  if(!isCorrect){
    wrongNotes.push({
      question:q.question.replace(/<[^>]*>/g,""),
      unit:q.unit,
      section:q.section,
      student:q.choices[choiceIndex].replace(/<[^>]*>/g,""),
      answer:q.choices[q.answer].replace(/<[^>]*>/g,""),
      explanation:q.explanation,
      keywords:q.keywords,
      raw:q
    });

    if(q.section==="concept" && !isConceptRetryMode && !conceptWrongQueue.some(item=>item.id===q.id)){
      conceptWrongQueue.push(q);
    }
  }

  showFeedback(questionIndex,isCorrect,choiceIndex);
  updateProgress();
}

function showFeedback(questionIndex,isCorrect,choiceIndex){
  const q=currentQuestions[questionIndex];
  const card=document.getElementById(`qcard-${questionIndex}`);
  if(!card) return;

  card.classList.add(isCorrect ? "correct" : "wrong");
  const badge=card.querySelector(".result-badge");
  if(badge){
    badge.textContent=isCorrect ? "✅ 정답!" : `❌ 오답 — 정답: ${["","①","②","③","④","⑤"][q.answer+1] || q.answer+1}`;
  }

  const btnChoices=card.querySelectorAll(".choice-btn");
  if(btnChoices.length){
    btnChoices.forEach((btn,i)=>{
      btn.disabled=true;
      if(i===q.answer) btn.classList.add("correct");
      if(i===choiceIndex && !isCorrect) btn.classList.add("wrong");
    });
  }

  const rowChoices=card.querySelectorAll(".choice-row");
  if(rowChoices.length){
    rowChoices.forEach((row,i)=>{
      row.style.pointerEvents='none';
      if(i===q.answer) row.classList.add("correct");
      if(i===choiceIndex && !isCorrect) row.classList.add("wrong");
    });
  }

  const fb=document.getElementById(`feedback-${questionIndex}`);
  fb.className="feedback show "+(isCorrect?"correct":"wrong");

  fb.querySelector(".feedback-title").textContent=isCorrect ? "정답입니다!" : "오답입니다.";
  fb.querySelector(".feedback-text").innerHTML=`<b>정답:</b> ${q.choices[q.answer]}<br>${q.explanation}`;

  const kw=fb.querySelector(".keyword-wrap");
  kw.innerHTML="";
  q.keywords.forEach(k=>{
    const span=document.createElement("span");
    span.className="keyword";
    span.textContent=k;
    kw.appendChild(span);
  });
}

function updateProgress(){
  const answered=userAnswers.filter(v=>v!==undefined).length;

  const correctEl=document.getElementById("correctCount");
  const wrongEl=document.getElementById("wrongCount");
  if(correctEl) correctEl.textContent=score;
  if(wrongEl) wrongEl.textContent=answered-score;

  const completion=document.getElementById("completionBox");
  const finishBtn=document.getElementById("finishBtn");
  const completionText=document.getElementById("completionText");

  if(currentQuestions.length && answered===currentQuestions.length){
    completion.classList.remove("hidden");
    if(currentSection==="concept" && !isConceptRetryMode && conceptWrongQueue.length>0){
      completionText.textContent=`개념 문제를 모두 풀었습니다. 틀린 ${conceptWrongQueue.length}문제를 한 번 더 이어서 풀어봅니다.`;
      finishBtn.textContent="틀린 문제 이어서 풀기";
    }else{
      completionText.textContent="모든 문제를 풀었습니다. 결과를 확인하세요.";
      finishBtn.textContent="결과 보기";
    }
  }else{
    completion.classList.add("hidden");
  }

  updateTotalProgress();
}

function updateTotalProgress(){
  const total=allQuestions.length;
  const done=solvedIds.length;
  const percent=total ? Math.round(done/total*100) : 0;

  const totalProgressText=document.getElementById("totalProgressText");
  const totalProgressFill=document.getElementById("totalProgressFill");
  if(totalProgressText) totalProgressText.textContent=`${percent}%`;
  if(totalProgressFill) totalProgressFill.style.width=`${percent}%`;
}

function finishQuiz(){
  if(currentSection==="concept" && !isConceptRetryMode && conceptWrongQueue.length>0){
    startConceptWrongRetry();
    return;
  }

  const total=currentQuestions.length;
  const percent=total ? Math.round(score/total*100) : 0;
  const wrong=total-score;

  menuScores[currentMenuKey]={correct:score,wrong};
  localStorage.setItem("menuScores_final_v5",JSON.stringify(menuScores));

  document.getElementById("resultTitle").textContent=isConceptRetryMode ? "개념 오답 확인 완료" : "퀴즈 완료";
  document.getElementById("resultScore").textContent=`${percent}%`;
  document.getElementById("resultDetail").textContent=`총 ${total}문제 중 ${score}문제 정답, ${wrong}문제 오답입니다.`;

  const review=document.getElementById("wrongReview");
  review.innerHTML="";

  const currentIds=new Set(currentQuestions.map(q=>q.id));
  const currentWrong=wrongNotes.filter(n=>currentIds.has(n.raw.id));

  if(currentWrong.length){
    currentWrong.slice(-10).forEach(n=>{
      const div=document.createElement("div");
      div.className="review-item";
      div.innerHTML=`
        <b>${n.unit}</b><br>
        ${n.question}<br>
        <span style="color:#B91C1C">내 답: ${n.student}</span> /
        <span style="color:#15803D">정답: ${n.answer}</span><br>
        ${n.explanation}
      `;
      review.appendChild(div);
    });
  }else{
    review.innerHTML=`<div class="review-item">이번 퀴즈에서 틀린 문제가 없습니다.</div>`;
  }

  showScreen("resultScreen");
  renderMenu();
}

function retryWrongAnswers(){
  const ids=new Set(wrongNotes.map(n=>n.raw.id));
  currentQuestions=allQuestions.filter(q=>ids.has(q.id));

  if(currentQuestions.length===0){
    alert("다시 풀 오답이 없습니다.");
    return;
  }

  currentIndex=0;
  userAnswers=[];
  submitted=false;
  score=0;
  isConceptRetryMode=false;

  document.getElementById("retryBanner").classList.remove("show");
  showScreen("quizScreen");
  renderQuestions();
  window.scrollTo({top:0,behavior:"smooth"});
}

function restartCurrentQuiz(){
  if(["past","mock1","mock2","mock3"].includes(currentSection)){
    startMockTest(currentSection);
  }else{
    startSection(currentUnit,currentSection);
  }
}

function makeTxt(items,includeStudent){
  return items.map((q,i)=>{
    const raw=q.raw || q;
    return [
      `문제 ${i+1}`,
      `단원명: ${raw.unit}`,
      `문제 구분: ${sectionNames[raw.section] || raw.section}`,
      `문제 핵심 문장: ${raw.question.replace(/<[^>]*>/g,"")}`,
      includeStudent && q.student ? `학생 답: ${q.student}` : "",
      `정답: ${q.answer || raw.choices[raw.answer].replace(/<[^>]*>/g,"")}`,
      `핵심 키워드: ${(raw.keywords || []).join(", ")}`,
      `한 줄 정리: ${raw.explanation}`
    ].filter(Boolean).join("\n");
  }).join("\n\n--------------------\n\n");
}

function downloadText(filename,text){
  const blob=new Blob([text],{type:"text/plain;charset=utf-8"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(a.href);
}

function downloadSummary(){
  downloadText("전체_핵심정리.txt",makeTxt(allQuestions,false));
}

function downloadCurrentSummary(){
  downloadText("현재퀴즈_핵심정리.txt",makeTxt(currentQuestions,false));
}

function downloadWrongNote(){
  if(wrongNotes.length===0){
    alert("저장된 오답이 없습니다.");
    return;
  }
  downloadText("오답노트.txt",makeTxt(wrongNotes,true));
}

renderMenu();
startSection(unitOrder[0],"concept");
</script>
